services:
  mongodb:
    image: mongo:7
    container_name: business_mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: dairy_test_db
    environment:
      - POSTGRES_USER=dairy_user
      - POSTGRES_PASSWORD=dairy_pass
      - POSTGRES_DB=dairy_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/data/postgres
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: business_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build:
      context: ./fastapi-backend
    container_name: business_backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://admin:password@mongodb:27017/business_os?authSource=admin
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_HOST=http://host.docker.internal:11434
      - MODEL_NAME=qwen3:8b
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  worker:
    build:
      context: ./fastapi-backend
    container_name: business_worker
    command: celery -A core.celery_app worker --loglevel=info
    environment:
      - MONGO_URI=mongodb://admin:password@mongodb:27017/business_os?authSource=admin
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_HOST=http://host.docker.internal:11434
      - MODEL_NAME=qwen3:8b
    depends_on:
      - mongodb
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: business_frontend
    ports:
      - "3001:80"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
  postgres_data:
